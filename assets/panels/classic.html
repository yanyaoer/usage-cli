<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: dark light;
      --bg: #080d12;
      --panel: rgba(25, 33, 42, 0.86);
      --panel-border: rgba(255, 255, 255, 0.15);
      --line: rgba(255, 255, 255, 0.13);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.58);
      --track: rgba(255, 255, 255, 0.12);
      --button: rgba(255, 255, 255, 0.08);
      --button-border: rgba(255, 255, 255, 0.18);
      --claude: #f49164;
      --codex: #58d6e6;
      --antigravity: #4285f4;
      --warn: #ffc439;
      --danger: #ff453a;
      --radius: 18px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #eef2f7;
        --panel: rgba(255, 255, 255, 0.88);
        --panel-border: rgba(20, 28, 38, 0.14);
        --line: rgba(20, 28, 38, 0.13);
        --text: rgba(12, 18, 26, 0.9);
        --muted: rgba(12, 18, 26, 0.55);
        --track: rgba(12, 18, 26, 0.11);
        --button: rgba(12, 18, 26, 0.05);
        --button-border: rgba(12, 18, 26, 0.14);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans TC", sans-serif;
      letter-spacing: 0;
      overscroll-behavior: none;
    }

    body {
      padding: 14px;
      background:
        radial-gradient(circle at 20% 0%, rgba(66, 133, 244, 0.14), transparent 34%),
        linear-gradient(180deg, #101922 0%, var(--bg) 100%);
    }

    @media (prefers-color-scheme: light) {
      body {
        background:
          radial-gradient(circle at 20% 0%, rgba(66, 133, 244, 0.12), transparent 34%),
          linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
      }
    }

    .wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      height: 100%;
    }

    .card,
    .footer {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .card {
      padding: 16px 18px 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      height: 32px;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: cover;
      flex: none;
    }

    .brand h1 {
      margin: 0;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 21px;
      line-height: 1;
      font-weight: 750;
    }

    .switch {
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--button-border);
      border-radius: 9px;
      background: var(--button);
      color: var(--text);
      font: 650 12px/26px -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      white-space: nowrap;
    }

    .row + .row {
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 10px;
    }

    .row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .row-title {
      font-size: 15px;
      line-height: 18px;
      font-weight: 720;
    }

    .percent {
      font-size: 13px;
      line-height: 18px;
      font-weight: 760;
      color: var(--accent);
      white-space: nowrap;
    }

    .track {
      height: 8px;
      border-radius: 99px;
      overflow: hidden;
      background: var(--track);
    }

    .fill {
      width: 0%;
      height: 100%;
      min-width: 0;
      border-radius: inherit;
      background: var(--accent);
      transition: width 140ms ease-out, background-color 140ms ease-out;
    }

    .reset {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 13px;
      font-weight: 620;
      text-align: right;
      white-space: nowrap;
    }

    .row[data-available="false"] .percent,
    .row[data-available="false"] .reset {
      color: var(--muted);
    }

    .row[data-available="false"] .fill {
      width: 0%;
    }

    .footer {
      min-height: 144px;
      padding: 14px 18px 12px;
    }

    .meta {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13.5px;
      line-height: 18px;
      font-weight: 620;
    }

    .today {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      color: var(--text);
      font-size: 15px;
      line-height: 20px;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }


    .action {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      border: 1px solid var(--button-border);
      border-radius: 8px;
      background: var(--button);
      color: var(--text);
      font: 700 13px/1 -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      white-space: nowrap;
      flex: 1;
    }

    .action.primary {
      border-color: rgba(88, 214, 230, 0.45);
      background: linear-gradient(180deg, #34d7f2, #18acd8);
      color: white;
    }


  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" data-card="claude" style="--accent: var(--claude)">
      <header class="brand">
        <img src="{{CLAUDE_ICON}}" alt="">
        <h1>Claude Code</h1>
        <button class="switch" data-action="switch">⇄ 更換面板</button>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="codex" style="--accent: var(--codex)">
      <header class="brand">
        <img src="{{CODEX_ICON}}" alt="">
        <h1>Codex</h1>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="antigravity" style="--accent: var(--antigravity)">
      <header class="brand">
        <img src="{{ANTIGRAVITY_ICON}}" alt="">
        <h1>Antigravity</h1>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="footer">
      <div class="meta">
        <div data-footer="rate">速率：--</div>
        <div data-footer="status">狀態：載入中</div>
      </div>
      <div class="today" data-footer="today">今日：$0.00 (0 tokens)</div>

      <div class="actions">
        <button class="action primary" data-action="refresh">↻ 立即更新</button>
        <button class="action" data-action="quit">⏻ 結束</button>
      </div>
    </section>
  </main>

  <script>
    const root = document.documentElement;
    const labels = { session: "Session", weekly: "Weekly" };

    function cssVar(name) {
      return getComputedStyle(root).getPropertyValue(name).trim();
    }

    function colorFor(percent, fallback) {
      if (typeof percent !== "number") return fallback;
      if (percent >= 80) return cssVar("--danger");
      if (percent >= 50) return cssVar("--warn");
      return fallback;
    }

    function renderRow(card, key, row) {
      const el = document.querySelector(`[data-card="${card}"] [data-row="${key}"]`);
      if (!el) return;
      const data = row || { percent: null, percentText: "--", resetText: "重置 --", available: false };
      const available = data.available === true && typeof data.percent === "number";
      const accent = getComputedStyle(el.closest(".card")).getPropertyValue("--accent").trim();
      const color = colorFor(data.percent, accent);
      el.dataset.available = available ? "true" : "false";
      el.innerHTML = `
        <div class="row-head">
          <div class="row-title"></div>
          <div class="percent"></div>
        </div>
        <div class="track"><div class="fill"></div></div>
        <div class="reset"></div>
      `;
      el.querySelector(".row-title").textContent = labels[key];
      el.querySelector(".percent").textContent = data.percentText || "--";
      el.querySelector(".reset").textContent = data.resetText || "重置 --";
      el.querySelector(".percent").style.color = available ? color : "";
      const fill = el.querySelector(".fill");
      fill.style.width = available ? `${Math.max(0, Math.min(100, data.percent))}%` : "0%";
      fill.style.background = color;
    }

    function applyCard(name, rows) {
      renderRow(name, "session", rows && rows.session);
      renderRow(name, "weekly", rows && rows.weekly);
    }

    window.usageApplyState = function usageApplyState(state) {
      applyCard("claude", state.claude);
      applyCard("codex", state.codex);
      applyCard("antigravity", state.antigravity);
      document.querySelector('[data-footer="rate"]').textContent = state.footer.rate || "速率：--";
      document.querySelector('[data-footer="status"]').textContent = state.footer.status || "狀態：--";
      document.querySelector('[data-footer="today"]').textContent = state.footer.today || "今日：--";

    };

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      window.webkit.messageHandlers.usage.postMessage(button.dataset.action);
    });

    window.usageApplyState({
      claude: { session: {}, weekly: {} },
      codex: { session: {}, weekly: {} },
      antigravity: { session: {}, weekly: {}, model: "--" },
      footer: { rate: "速率：--", status: "狀態：載入中", today: "今日：$0.00 (0 tokens)", showInstall: false }
    });
  </script>
</body>
</html>
